services:
  jeeves:
    # Pull the latest image built by CI from GitHub Container Registry.
    # To build locally instead: replace `image:` with `build: .`
    image: ghcr.io/adamlow-wire/wire-team-bot:latest
    container_name: jeeves
    restart: unless-stopped
    env_file:
      # Copy .env.example → .env on the server and fill in real values.
      # This file is never committed to the repo.
      - .env
    environment:
      # Override DATABASE_URL to point at the compose postgres service.
      DATABASE_URL: postgres://wirebot:wirebot@postgres:5432/wire_team_bot
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Wire SDK crypto store — must persist across restarts.
      # Losing this means the bot loses all E2EE session state.
      - jeeves-crypto:/app/storage

  postgres:
    image: pgvector/pgvector:pg16
    container_name: jeeves-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wirebot
      POSTGRES_PASSWORD: wirebot
      POSTGRES_DB: wire_team_bot
    volumes:
      - jeeves-db:/var/lib/postgresql/data
    # Bind to localhost only — not reachable from outside the host.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wirebot -d wire_team_bot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Optional: local Ollama for on-premises inference ─────────────────────
  # Uncomment this service and set JEEVES_LLM_BASE_URL=http://ollama:11434/v1
  # in your .env if you want all LLM calls to stay on the host.
  #
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: jeeves-ollama
  #   restart: unless-stopped
  #   volumes:
  #     - jeeves-ollama:/root/.ollama
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   # NVIDIA GPU support — uncomment if available:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: all
  #   #           capabilities: [gpu]

volumes:
  jeeves-db:
  jeeves-crypto:
  # jeeves-ollama:
