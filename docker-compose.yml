services:
  bot:
    build: .
    container_name: wire-team-bot
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://wirebot:wirebot@db:5432/wire_team_bot
      # Passive LLM — ambient listening, intent classification, capture detection.
      # Points at the local Ollama instance by default so no message content
      # leaves the company network. Override in .env to use a cloud model.
      LLM_PASSIVE_BASE_URL: http://ollama:11434/v1
      LLM_PASSIVE_MODEL: ${LLM_PASSIVE_MODEL:-gemma3:4b}
      LLM_PASSIVE_PROVIDER: ollama
      LLM_PASSIVE_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      # Wire SDK crypto store — must persist across restarts.
      # Losing this means the bot loses all E2EE conversation state and
      # cannot encrypt/decrypt messages until it re-joins each conversation.
      - sdk-data:/app/storage
    restart: unless-stopped
    # No inbound ports exposed — the bot connects outbound to Wire only.

  db:
    image: postgres:16-alpine
    container_name: wire-team-bot-db
    environment:
      POSTGRES_DB: wire_team_bot
      POSTGRES_USER: wirebot
      POSTGRES_PASSWORD: wirebot
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wirebot -d wire_team_bot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Bind to localhost only — not reachable from outside the host.
    ports:
      - "127.0.0.1:5432:5432"

  ollama:
    image: ollama/ollama:latest
    container_name: wire-team-bot-ollama
    volumes:
      - ollama-data:/root/.ollama
    # Pull the passive model on first start. Change the model name to
    # match LLM_PASSIVE_MODEL if you prefer a different one (e.g. gemma3:4b).
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull ${LLM_PASSIVE_MODEL:-gemma3:4b} &&
             wait"
    restart: unless-stopped
    # No ports exposed to the host — only reachable by other containers.
    # Uncomment the lines below if you want to query Ollama directly from
    # the host during development:
    ports:
      - "127.0.0.1:11434:11434"

    # GPU support (NVIDIA). Uncomment if your host has a CUDA-capable GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  db-data:
  ollama-data:
  sdk-data:
